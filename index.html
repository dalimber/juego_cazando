<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css">
  <script src="utilitario.js"></script>
</head>
<body onload="iniciarJuego()">

  <header>
    <h1>Juego Cazando</h1>
  </header>

  <main class="juego-contenedor">
    <div class="area-grafica">
      <canvas id="areaJuego" width="500" height="500"></canvas>
    </div>

    <div class="controles-direccion">
      <button onclick="moverArriba()">⬆</button>
      <div class="fila-horizontal">
        <button onclick="moverIzquierda()">⬅</button>
        <button onclick="moverAbajo()">⬇</button>
        <button onclick="moverDerecha()">➡</button>
      </div>
    </div>
  </main>

  <section class="estado-juego">
    <div class="panel">
      <span>Puntos: <span id="puntos">0</span></span>
      <span>Tiempo: <span id="tiempo">10</span></span>
    </div>
    
    <div class="controles-accion">
      <button onclick="reiniciar()" id="btn-reiniciar">Reiniciar</button>
    </div>
    
    <p id="mensaje"></p>
  </section>

  <footer>
    <p>Autor: Javier Andrade</p>
  </footer>

</body>
<script src="cazando.js"></script>
</html>
